name: Validate content

# Validates the content graph, types, and build on every push and PR.
# Deployment itself stays with Cloudflare Pages' git integration — this
# workflow is the gate that catches broken references before they ship.

on:
  push:
    branches: [main]
  pull_request:

defaults:
  run:
    working-directory: pablocorzosite

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: pablocorzosite/.node-version
          cache: npm
          cache-dependency-path: pablocorzosite/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx astro check

      - name: Validate content
        run: npm run validate:content

      - name: Build content graph
        run: npm run build:graph

      - name: Tests
        run: npm test

      - name: Build site
        run: npm run build
